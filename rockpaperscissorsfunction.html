<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple game</title>
</head>
<body>
  <p>Rock Paper Scissors</p>
  <button onclick="
    const computerMove = pickComputerMove();

    let result = '';

    if (computerMove === 'Rock') {
      result = 'Tie';
    } else if (computerMove === 'Scissors') {
      result = 'You win!';
    } else if (computerMove === 'Paper') {
      result = 'Better luck next time!';
    }

    alert(`You picked Rock. The computer picked ${computerMove}. ${result}`);
  ">Rock</button>
    
    
    <button onclick = "
    const computerMove = pickComputerMove();

    let result = '';

    if (computerMove === 'Rock') {
      result = 'You Lose!';
    } else if (computerMove === 'Scissors') {
      result = 'Scissors! Bam Bam Bam Bam!';
    } else if (computerMove === 'Paper') {
      result = 'All you do is win';
    }

    alert(`You picked Scissors. The computer picked ${computerMove}. ${result}`);
  "> Scissors </button>

  <button onclick="
    const computerMove = pickComputerMove();

    let result = '';

    if (computerMove === 'Rock') {
      result = 'You win!';
    } else if (computerMove === 'Scissors') {
      result = 'You Loose!';
    } else if (computerMove === 'Paper') {
      result = 'Its a TIe!';
    }

    alert(`You picked Paper. The computer picked ${computerMove}. ${result}`);
  "> Paper</button>
    <script>
      let computerMove = ''; 

      function pickComputerMove(){
      const randomNumber = Math.random();

      if (randomNumber >= 0 && randomNumber < 1/3) {
        computerMove = 'Rock';
      } else if (randomNumber >= 1/3 && randomNumber < 2/3) {
        computerMove = 'Paper';
      } else if (randomNumber >= 2/3 && randomNumber < 1) {
        computerMove = 'Scissors';

      return computerMove;
    }
      }
    </script>
</body>
</html>
